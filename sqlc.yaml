version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/account/db/queries/"
    schema: "migrations/billing/"
    gen:
      go:
        package: "db"
        out: "internal/account/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "string"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
