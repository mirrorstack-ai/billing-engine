name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mirrorstack
          POSTGRES_PASSWORD: mirrorstack
          POSTGRES_DB: mirrorstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mirrorstack"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: mirrorstack
          DB_PASSWORD: mirrorstack
          DB_NAME: mirrorstack
          DB_SSL_MODE: disable
        run: go test -v -race -count=1 ./...
