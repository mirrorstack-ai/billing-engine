name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mirrorstack
          POSTGRES_PASSWORD: mirrorstack
          POSTGRES_DB: mirrorstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mirrorstack"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Create schema
        env:
          PGHOST: localhost
          PGUSER: mirrorstack
          PGPASSWORD: mirrorstack
          PGDATABASE: mirrorstack
        run: |
          psql -c "CREATE SCHEMA IF NOT EXISTS ms_billing_account;"

      - name: Run migrations
        env:
          PGHOST: localhost
          PGUSER: mirrorstack
          PGPASSWORD: mirrorstack
          PGDATABASE: mirrorstack
        run: |
          for f in migrations/account/*.up.sql; do
            echo "Applying $f"
            psql -f "$f"
          done

      - name: Validate migrations (down + up idempotent)
        env:
          PGHOST: localhost
          PGUSER: mirrorstack
          PGPASSWORD: mirrorstack
          PGDATABASE: mirrorstack
        run: |
          for f in $(ls -r migrations/account/*.down.sql); do
            echo "Rolling back $f"
            psql -f "$f"
          done
          for f in migrations/account/*.up.sql; do
            echo "Re-applying $f"
            psql -f "$f"
          done

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: mirrorstack
          DB_PASSWORD: mirrorstack
          DB_NAME: mirrorstack
          DB_SSL_MODE: disable
        run: go test -v -race -count=1 ./...
