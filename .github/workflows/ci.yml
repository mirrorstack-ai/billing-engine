name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mirrorstack
          POSTGRES_PASSWORD: mirrorstack
          POSTGRES_DB: mirrorstack
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mirrorstack"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"

      - name: Run migrations
        env:
          PGHOST: localhost
          PGUSER: mirrorstack
          PGPASSWORD: mirrorstack
          PGDATABASE: mirrorstack
        run: |
          for f in migrations/billing/*.up.sql; do
            echo "Applying $f"
            psql -f "$f"
          done

      - name: Validate migrations (down + up idempotent)
        env:
          PGHOST: localhost
          PGUSER: mirrorstack
          PGPASSWORD: mirrorstack
          PGDATABASE: mirrorstack
        run: |
          for f in $(ls -r migrations/billing/*.down.sql); do
            echo "Rolling back $f"
            psql -f "$f"
          done
          for f in migrations/billing/*.up.sql; do
            echo "Re-applying $f"
            psql -f "$f"
          done

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (unit)
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: mirrorstack
          DB_PASSWORD: mirrorstack
          DB_NAME: mirrorstack
          DB_SSL_MODE: disable
        run: go test -race -count=1 ./...

      # Integration tests use testcontainers-go to boot their own
      # ephemeral Postgres container per test. They don't touch the
      # workflow-level `services: postgres` block above — that block
      # is for the migration-validation psql step. The GHA ubuntu-latest
      # runner has Docker pre-installed, so testcontainers Just Works.
      - name: Test (integration)
        run: go test -tags=integration -race -count=1 -timeout=10m ./...
