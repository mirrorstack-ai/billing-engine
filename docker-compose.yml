services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mirrorstack
      POSTGRES_PASSWORD: mirrorstack
      POSTGRES_DB: mirrorstack
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirrorstack"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
